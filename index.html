<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Daishboard</title>
    <link rel="stylesheet" href="style.css">
</head>
<script src="components/common/ImgButton/ImgButton.js" type="module"></script>
<script src="components/ContentCard/ContentCard.js" type="module"></script>
<script src="https://cdn.jsdelivr.net/npm/marked/lib/marked.umd.js" type="module"></script>
<body>
    <!-- hyper-modal: modal element for every draagable context. -->
    <hyper-modal id="hyperModal" enable="false"></hyper-modal>
    <div id="sidebarContainer" class="sidebar-container">
        <img-button id="hello" class="sidebar-logo" src="./res/logoWText.png"></img-button>
    </div>
    <div id="cardContainer" class="card-container">
        <div class="startPadding" style="width: 0.5rem; flex-shrink: 0;"></div>
        <content-card cardType="conversation"></content-card>
        <memo-card title="ello" content="Lorem Ipsum"></memo-card>
    </div>
</body>
</html>
