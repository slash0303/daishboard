<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Daishboard</title>
    <link rel="stylesheet" href="style.css">
</head>
<script src="components/common/ImgButton/ImgButton.js" type="module"></script>
<script src="components/ContentCard/ContentCard.js" type="module"></script>
<script src="https://cdn.jsdelivr.net/npm/marked/lib/marked.umd.js" type="module"></script>
<body>
    <!-- hyper-modal: modal element for every draagable context. -->
    <hyper-modal id="hyperModal" enable="false"></hyper-modal>
    <div id="sidebarContainer" class="sidebar sidebar__general-container">
        <img-button id="hello" class="sidebar sidebar__logo" src="./res/logoWText.png"></img-button>
        <div class="sidebar__content-container" id="recentContainer">
            <div class="sidebar__label-container">
                <div class="sidebar__label-text" id="recentContentLabel">Recent</div>
                <hr class="sidebar__label-div-line">
            </div>
            <div class="sidebar__note-title-container">
                <button class="sidebar__note-title-content">hello world!</button>
                <button class="sidebar__note-title-content">hello world!</button>
            </div>
        </div>
    </div>
    <div id="cardContainer" class="card-container">
        <img-button id="leftCardButton" src="./res/arrowDown.svg" class="card-button left"></img-button>
        <img-button id="rightCardButton" src="./res/arrowDown.svg" class="card-button right"></img-button>
        <div class="startPadding" style="width: 0.5rem; flex-shrink: 0;"></div>
        <content-card cardType="conversation"></content-card>
        <!-- <memo-card title="ello" content="Lorem Ipsum"></memo-card> -->
        <content-card cardType="memo" title="hello" content="fuck"></content-card>
    </div>
</body>
</html>
